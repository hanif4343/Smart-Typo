<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TypeBangla — AI Typing RPG</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="topbar">
  <span class="logo">TypeBangla</span>
  <button id="viewToggleBtn" class="toggle-btn">Desktop Version</button>
</header>

<main id="app">
  <section class="hero">
    <h1>বাংলা টাইপিং মাস্টার হও</h1>
    <p>Phase 1-2 চলছে — Typing Engine ও AI Lesson System কাজ করছে।</p>

    <div id="authArea" style="margin: 16px 0;">
      <button id="signInBtn" class="next-btn" style="display:none;">🔑 Google দিয়ে Sign in করো</button>
      <div id="userInfo" style="display:none; color: var(--muted); font-size:0.9rem;">
        সাইন-ইন করা আছে: <span id="userName"></span>
        (AI: <span id="aiStatus"></span>)
        <br/>
        <button id="signOutBtn" class="toggle-btn" style="margin-top:8px;">Sign out</button>
      </div>
    </div>

    <a href="lesson.html" class="settings-link">🧠 আজকের Lesson (AI)</a><br/>
    <a href="practice.html" class="settings-link">▶️ ফ্রি প্র্যাকটিস</a><br/>
    <a href="settings.html" class="settings-link">⚙️ Settings (API key)</a>

    <div id="debugBox" style="display:none; margin-top:20px; padding:12px; background:#3a1414; border:1px solid #ff6b6b; border-radius:8px; color:#ffb3b3; font-size:0.85rem; text-align:left; word-break:break-word;"></div>
  </section>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/view-mode.js"></script>
<script>
  const signInBtn = document.getElementById("signInBtn");
  const userInfo = document.getElementById("userInfo");
  const userName = document.getElementById("userName");
  const aiStatus = document.getElementById("aiStatus");
  const debugBox = document.getElementById("debugBox");

  function showDebug(msg) {
    debugBox.style.display = "block";
    debugBox.textContent = "⚠️ " + msg;
  }

  // Surface any uncaught script error directly on the page — there's no
  // desktop DevTools available on phone, so this is the debug channel.
  window.addEventListener("error", (e) => {
    showDebug("Script error: " + e.message + " (" + e.filename + ":" + e.lineno + ")");
  });

  signInBtn.addEventListener("click", () => {
    debugBox.style.display = "none";
    if (typeof TBAuth === "undefined") {
      showDebug("TBAuth লোড হয়নি — Firebase SDK script ঠিকমতো লোড হয়েছে কিনা চেক করো (network/CDN)।");
      return;
    }
    TBAuth.signInWithGoogle().catch((err) => {
      showDebug("Sign-in error [" + err.code + "]: " + err.message);
    });
  });

  document.getElementById("signOutBtn").addEventListener("click", TBAuth.signOutUser);

  TBAuth.onReady((tbUser) => {
    if (tbUser) {
      signInBtn.style.display = "none";
      userInfo.style.display = "block";
      userName.textContent = tbUser.name || tbUser.uid;
      aiStatus.textContent = tbUser.aiEnabled ? "চালু ✅" : "বন্ধ ❌";
    } else {
      signInBtn.style.display = "block";
      userInfo.style.display = "none";
      if (window.TBLastAuthError) {
        showDebug("Auth/Firestore error: " + window.TBLastAuthError);
      }
    }
  });
</script>
</body>
</html>
