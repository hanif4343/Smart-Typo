<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Practice — TypeBangla</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  .practice-wrap { padding: 16px; max-width: 640px; margin: 0 auto; }
  .level-picker { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .level-picker button {
    flex: 1; min-width: 70px; padding: 8px; border-radius: 8px; border: 1px solid var(--muted);
    background: var(--panel); color: var(--text); font-size: 0.85rem;
  }
  .level-picker button.active { background: var(--accent); color: #0b0d17; border-color: var(--accent); }

  .target-text {
    font-size: 1.3rem; line-height: 2; padding: 16px; background: var(--panel);
    border-radius: 12px; margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .target-text .correct { color: var(--accent); }
  .target-text .incorrect { color: #ff6b6b; text-decoration: underline; }
  .target-text .pending { color: var(--muted); }

  textarea#typeInput {
    width: 100%; min-height: 90px; font-size: 1.2rem; padding: 12px; border-radius: 10px;
    border: 1px solid var(--muted); background: var(--panel); color: var(--text);
  }

  .stats-row { display: flex; gap: 12px; margin-top: 14px; }
  .stat-box { flex: 1; background: var(--panel); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-box .num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 0.75rem; color: var(--muted); }

  .combat-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    background: var(--panel); border-radius: 10px; padding: 10px 14px;
  }
  .enemy-emoji { font-size: 1.8rem; }
  .enemy-name { font-size: 0.8rem; color: var(--muted); min-width: 60px; }
  .hp-bar-track { flex: 1; height: 12px; background: #2a1f2f; border-radius: 999px; overflow: hidden; }
  .hp-bar-fill { height: 100%; background: #ff6b6b; width: 100%; transition: width 0.15s ease; }
  .combo-badge {
    font-size: 0.85rem; font-weight: 700; color: #ffd166; min-width: 54px; text-align: right;
  }
  .player-bar-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    background: var(--panel); border-radius: 10px; padding: 10px 14px; font-size: 0.85rem;
  }
  .xp-bar-track { flex: 1; height: 8px; background: #14202a; border-radius: 999px; overflow: hidden; }
  .xp-bar-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.2s ease; }
  .reward-line { color: var(--accent); font-weight: 700; margin-top: 8px; }

  .result-box { margin-top: 16px; padding: 14px; background: var(--panel); border-radius: 10px; }
  .result-box h3 { margin-top: 0; }
  .weak-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .weak-chip {
    background: #2a1f33; color: #ffb3b3; padding: 4px 10px; border-radius: 999px; font-size: 0.95rem;
  }

  .next-btn {
    margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: var(--accent); color: #0b0d17; font-weight: 700; font-size: 1rem;
  }
</style>
</head>
<body>

<header class="topbar">
  <span class="logo">TypeBangla</span>
  <a href="index.html" class="toggle-btn" style="text-decoration:none;">← হোম</a>
</header>

<div class="practice-wrap">
  <div class="player-bar-row">
    <span id="playerLevel">Lv 1</span>
    <div class="xp-bar-track"><div class="xp-bar-fill" id="xpBarFill"></div></div>
    <span id="playerGold">💰 0</span>
    <span id="playerStreak">🔥 0</span>
  </div>

  <div class="combat-row">
    <span class="enemy-emoji" id="enemyEmoji">👹</span>
    <span class="enemy-name" id="enemyName">Slime</span>
    <div class="hp-bar-track"><div class="hp-bar-fill" id="enemyHpFill"></div></div>
    <span class="combo-badge" id="comboBadge"></span>
  </div>

  <div class="level-picker" id="levelPicker">
    <button data-level="letters">অক্ষর</button>
    <button data-level="conjuncts">যুক্তাক্ষর</button>
    <button data-level="words" class="active">শব্দ</button>
    <button data-level="sentences">বাক্য</button>
  </div>

  <div class="target-text" id="targetDisplay"></div>

  <textarea id="typeInput" placeholder="এখানে টাইপ শুরু করো..." autocapitalize="off" autocorrect="off"></textarea>

  <div class="stats-row">
    <div class="stat-box"><div class="num" id="wpmVal">0</div><div class="lbl">WPM</div></div>
    <div class="stat-box"><div class="num" id="accVal">100%</div><div class="lbl">Accuracy</div></div>
    <div class="stat-box"><div class="num" id="errVal">0</div><div class="lbl">Errors</div></div>
  </div>

  <div class="result-box" id="resultBox" style="display:none;">
    <h3>সেশন শেষ 🎉</h3>
    <p id="resultSummary"></p>
    <p id="coachMessage" style="color: var(--accent);"></p>
    <p class="reward-line" id="rewardLine"></p>
    <div>দুর্বল অক্ষর (এখন পর্যন্ত সব সেশন মিলিয়ে):</div>
    <div class="weak-list" id="weakList"></div>
  </div>

  <button class="next-btn" id="nextBtn">নতুন টেক্সট</button>

  <div id="debugBox" style="display:none; margin-top:16px; padding:12px; background:#3a1414; border:1px solid #ff6b6b; border-radius:8px; color:#ffb3b3; font-size:0.85rem; text-align:left; word-break:break-word;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="data/content-bank.js"></script>
<script src="data/enemies.js"></script>
<script src="js/typing-engine.js"></script>
<script src="js/session-store.js"></script>
<script src="js/game-engine.js"></script>
<script src="js/ai-client.js"></script>
<script src="js/ai-coach.js"></script>
<script src="js/view-mode.js"></script>
<script>
  // Make sure window.TBUser is populated before the rest of the page logic
  // (typing/AI) runs. TBAuth.onReady fires immediately with cached auth
  // state, so this is fast, not a real blocking wait.
  TBAuth.onReady(() => {});
</script>
<script>
  let currentLevel = "words";
  let currentEnemy = getRandomEnemy();
  const targetDisplay = document.getElementById("targetDisplay");
  const input = document.getElementById("typeInput");
  const wpmVal = document.getElementById("wpmVal");
  const accVal = document.getElementById("accVal");
  const errVal = document.getElementById("errVal");
  const resultBox = document.getElementById("resultBox");
  const resultSummary = document.getElementById("resultSummary");
  const weakList = document.getElementById("weakList");
  const debugBox = document.getElementById("debugBox");

  function showDebug(msg) {
    debugBox.style.display = "block";
    debugBox.textContent = "⚠️ " + msg;
  }
  window.addEventListener("error", (e) => {
    showDebug("Script error: " + e.message + " (" + e.filename + ":" + e.lineno + ")");
  });

  function renderTarget() {
    const ops = TypingEngine.getLastOps();
    let html = "";
    for (const op of ops) {
      if (op.type === "match") {
        html += `<span class="correct">${op.ch}</span>`;
      } else if (op.type === "sub") {
        html += `<span class="incorrect">${op.targetCh}</span>`;
      } else if (op.type === "pending") {
        html += `<span class="pending">${op.ch}</span>`;
      }
      // "insert" ops (extra characters the user typed with no target slot)
      // aren't shown inline in the target text — they still count toward
      // errors/accuracy, just not rendered character-by-character here.
    }
    targetDisplay.innerHTML = html || targetDisplay.innerHTML;
  }

  function renderPlayerBar() {
    const state = GameEngine.getPlayerState();
    const { level, xpIntoLevel, xpForNextLevel } = GameEngine.levelFromXp(state.totalXp);
    document.getElementById("playerLevel").textContent = "Lv " + level;
    document.getElementById("playerGold").textContent = "💰 " + state.gold;
    document.getElementById("playerStreak").textContent = "🔥 " + (state.currentStreak || 0);
    document.getElementById("xpBarFill").style.width = (xpIntoLevel / xpForNextLevel * 100) + "%";
  }

  function renderInitialTarget(text) {
    targetDisplay.innerHTML = [...text].map(ch => `<span class="pending">${ch}</span>`).join("");
  }

  function newRound() {
    const custom = sessionStorage.getItem("tb_custom_practice_text");
    let text;
    if (custom) {
      text = custom;
      sessionStorage.removeItem("tb_custom_practice_text");
    } else {
      text = getPracticeText(currentLevel);
    }
    TypingEngine.start(text);
    input.value = "";
    renderInitialTarget(text);
    wpmVal.textContent = "0";
    accVal.textContent = "100%";
    errVal.textContent = "0";
    resultBox.style.display = "none";
    currentEnemy = getRandomEnemy();
    document.getElementById("enemyHpFill").style.width = "100%";
    document.getElementById("enemyEmoji").textContent = currentEnemy.emoji;
    document.getElementById("enemyName").textContent = currentEnemy.name;
    document.getElementById("comboBadge").textContent = "";
    renderPlayerBar();
    input.focus();
  }

  input.addEventListener("input", (e) => {
    const typed = e.target.value;
    const stats = TypingEngine.handleInput(typed, e.inputType === "deleteContentBackward");
    renderTarget();
    wpmVal.textContent = stats.wpm;
    accVal.textContent = stats.accuracy + "%";
    errVal.textContent = stats.incorrectCount;

    // Combat visual: enemy HP drains as correct characters land.
    const targetLen = TypingEngine.getResult().targetText.length;
    const hpPct = Math.max(0, 100 - (stats.correctCount / targetLen) * 100);
    document.getElementById("enemyHpFill").style.width = hpPct + "%";
    document.getElementById("comboBadge").textContent =
      stats.currentCombo >= 5 ? "🔥×" + stats.currentCombo : "";

    if (stats.finished) {
      const result = TypingEngine.getResult();
      SessionStore.saveSession(result);
      document.getElementById("enemyHpFill").style.width = "0%";
      document.getElementById("enemyEmoji").textContent = currentEnemy.defeatedEmoji;

      resultSummary.textContent =
        `WPM: ${result.wpm} | Accuracy: ${result.accuracy}% | ভুল: ${result.incorrectCount} | সর্বোচ্চ Combo: ${result.maxCombo}`;
      const weak = SessionStore.getWeakChars(6);
      weakList.innerHTML = weak.length
        ? weak.map(w => `<span class="weak-chip">${w.ch} (${w.count})</span>`).join("")
        : "<span class='weak-chip'>এখনো কোনো ভুল ট্র্যাক হয়নি 🎉</span>";
      resultBox.style.display = "block";
      input.blur();

      const rewards = GameEngine.computeRewards(result);
      const rewardResult = GameEngine.addRewards(rewards.xp, rewards.gold);
      let rewardText = `+${rewards.xp} XP, +${rewards.gold} 💰`;
      if (rewards.comboBonusXp > 0) rewardText += ` (combo bonus +${rewards.comboBonusXp})`;
      if (rewardResult.leveledUp) rewardText += ` — Level Up! এখন Lv ${rewardResult.levelInfo.level} 🎉`;
      if (rewardResult.streakIncreased) rewardText += ` — 🔥 Streak ${rewardResult.state.currentStreak} দিন!`;
      document.getElementById("rewardLine").textContent = rewardText;
      renderPlayerBar();

      const coachEl = document.getElementById("coachMessage");
      coachEl.textContent = "কোচ ভাবছে...";
      AICoach.getMessage(result).then(msg => { coachEl.textContent = msg; });
    }
  });

  document.getElementById("levelPicker").addEventListener("click", (e) => {
    if (e.target.tagName !== "BUTTON") return;
    document.querySelectorAll("#levelPicker button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    currentLevel = e.target.dataset.level;
    newRound();
  });

  document.getElementById("nextBtn").addEventListener("click", newRound);

  newRound();
</script>

</body>
</html>
