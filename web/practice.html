<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Practice — TypeBangla</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  .practice-wrap { padding: 16px; max-width: 640px; margin: 0 auto; }
  .level-picker { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .level-picker button {
    flex: 1; min-width: 70px; padding: 8px; border-radius: 8px; border: 1px solid var(--muted);
    background: var(--panel); color: var(--text); font-size: 0.85rem;
  }
  .level-picker button.active { background: var(--accent); color: #0b0d17; border-color: var(--accent); }

  .target-text {
    font-size: 1.3rem; line-height: 2; padding: 16px; background: var(--panel);
    border-radius: 12px; margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .target-text .correct { color: var(--accent); }
  .target-text .incorrect { color: #ff6b6b; text-decoration: underline; }
  .target-text .pending { color: var(--muted); }

  textarea#typeInput {
    width: 100%; min-height: 90px; font-size: 1.2rem; padding: 12px; border-radius: 10px;
    border: 1px solid var(--muted); background: var(--panel); color: var(--text);
  }

  .stats-row { display: flex; gap: 12px; margin-top: 14px; }
  .stat-box { flex: 1; background: var(--panel); border-radius: 10px; padding: 12px; text-align: center; }
  .stat-box .num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .stat-box .lbl { font-size: 0.75rem; color: var(--muted); }

  .result-box { margin-top: 16px; padding: 14px; background: var(--panel); border-radius: 10px; }
  .result-box h3 { margin-top: 0; }
  .weak-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .weak-chip {
    background: #2a1f33; color: #ffb3b3; padding: 4px 10px; border-radius: 999px; font-size: 0.95rem;
  }

  .next-btn {
    margin-top: 14px; width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: var(--accent); color: #0b0d17; font-weight: 700; font-size: 1rem;
  }
</style>
</head>
<body>

<header class="topbar">
  <span class="logo">TypeBangla</span>
  <a href="index.html" class="toggle-btn" style="text-decoration:none;">← হোম</a>
</header>

<div class="practice-wrap">
  <div class="level-picker" id="levelPicker">
    <button data-level="letters">অক্ষর</button>
    <button data-level="conjuncts">যুক্তাক্ষর</button>
    <button data-level="words" class="active">শব্দ</button>
    <button data-level="sentences">বাক্য</button>
  </div>

  <div class="target-text" id="targetDisplay"></div>

  <textarea id="typeInput" placeholder="এখানে টাইপ শুরু করো..." autocapitalize="off" autocorrect="off"></textarea>

  <div class="stats-row">
    <div class="stat-box"><div class="num" id="wpmVal">0</div><div class="lbl">WPM</div></div>
    <div class="stat-box"><div class="num" id="accVal">100%</div><div class="lbl">Accuracy</div></div>
    <div class="stat-box"><div class="num" id="errVal">0</div><div class="lbl">Errors</div></div>
  </div>

  <div class="result-box" id="resultBox" style="display:none;">
    <h3>সেশন শেষ 🎉</h3>
    <p id="resultSummary"></p>
    <p id="coachMessage" style="color: var(--accent);"></p>
    <div>দুর্বল অক্ষর (এখন পর্যন্ত সব সেশন মিলিয়ে):</div>
    <div class="weak-list" id="weakList"></div>
  </div>

  <button class="next-btn" id="nextBtn">নতুন টেক্সট</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="data/content-bank.js"></script>
<script src="js/typing-engine.js"></script>
<script src="js/session-store.js"></script>
<script src="js/ai-client.js"></script>
<script src="js/ai-coach.js"></script>
<script src="js/view-mode.js"></script>
<script>
  // Make sure window.TBUser is populated before the rest of the page logic
  // (typing/AI) runs. TBAuth.onReady fires immediately with cached auth
  // state, so this is fast, not a real blocking wait.
  TBAuth.onReady(() => {});
</script>
<script>
  let currentLevel = "words";
  const targetDisplay = document.getElementById("targetDisplay");
  const input = document.getElementById("typeInput");
  const wpmVal = document.getElementById("wpmVal");
  const accVal = document.getElementById("accVal");
  const errVal = document.getElementById("errVal");
  const resultBox = document.getElementById("resultBox");
  const resultSummary = document.getElementById("resultSummary");
  const weakList = document.getElementById("weakList");

  function renderTarget(target, typed) {
    let html = "";
    for (let i = 0; i < target.length; i++) {
      const ch = target[i];
      if (i < typed.length) {
        html += typed[i] === ch
          ? `<span class="correct">${ch}</span>`
          : `<span class="incorrect">${ch}</span>`;
      } else {
        html += `<span class="pending">${ch}</span>`;
      }
    }
    targetDisplay.innerHTML = html;
  }

  function newRound() {
    const custom = sessionStorage.getItem("tb_custom_practice_text");
    let text;
    if (custom) {
      text = custom;
      sessionStorage.removeItem("tb_custom_practice_text");
    } else {
      text = getPracticeText(currentLevel);
    }
    TypingEngine.start(text);
    input.value = "";
    renderTarget(text, "");
    wpmVal.textContent = "0";
    accVal.textContent = "100%";
    errVal.textContent = "0";
    resultBox.style.display = "none";
    input.focus();
  }

  input.addEventListener("input", (e) => {
    const typed = e.target.value;
    const stats = TypingEngine.handleInput(typed, e.inputType === "deleteContentBackward");
    renderTarget(TypingEngine.getResult().targetText, typed);
    wpmVal.textContent = stats.wpm;
    accVal.textContent = stats.accuracy + "%";
    errVal.textContent = stats.incorrectCount;

    if (stats.finished) {
      const result = TypingEngine.getResult();
      SessionStore.saveSession(result);
      resultSummary.textContent =
        `WPM: ${result.wpm} | Accuracy: ${result.accuracy}% | ভুল: ${result.incorrectCount}`;
      const weak = SessionStore.getWeakChars(6);
      weakList.innerHTML = weak.length
        ? weak.map(w => `<span class="weak-chip">${w.ch} (${w.count})</span>`).join("")
        : "<span class='weak-chip'>এখনো কোনো ভুল ট্র্যাক হয়নি 🎉</span>";
      resultBox.style.display = "block";
      input.blur();

      const coachEl = document.getElementById("coachMessage");
      coachEl.textContent = "কোচ ভাবছে...";
      AICoach.getMessage(result).then(msg => { coachEl.textContent = msg; });
    }
  });

  document.getElementById("levelPicker").addEventListener("click", (e) => {
    if (e.target.tagName !== "BUTTON") return;
    document.querySelectorAll("#levelPicker button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    currentLevel = e.target.dataset.level;
    newRound();
  });

  document.getElementById("nextBtn").addEventListener("click", newRound);

  newRound();
</script>

</body>
</html>
