<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>আজকের Lesson — TypeBangla</title>
<link rel="stylesheet" href="css/style.css" />
<style>
  .lesson-wrap { padding: 20px; max-width: 560px; margin: 0 auto; }
  .lesson-card { background: var(--panel); border-radius: 12px; padding: 18px; margin-top: 16px; }
  .lesson-card p.reason { color: var(--muted); font-size: 0.9rem; }
  .lesson-text { font-size: 1.25rem; line-height: 1.9; margin: 12px 0; }
  .loading { color: var(--muted); text-align: center; padding: 30px; }
  .go-btn {
    width: 100%; padding: 12px; border: none; border-radius: 10px; margin-top: 10px;
    background: var(--accent); color: #0b0d17; font-weight: 700; font-size: 1rem;
  }
  .badge {
    display: inline-block; font-size: 0.75rem; padding: 2px 8px; border-radius: 999px;
    background: #22304a; color: var(--accent); margin-bottom: 8px;
  }
</style>
</head>
<body>

<header class="topbar">
  <span class="logo">TypeBangla</span>
  <a href="index.html" class="toggle-btn" style="text-decoration:none;">← হোম</a>
</header>

<div class="lesson-wrap">
  <h2>আজকের Lesson</h2>
  <div id="loadingMsg" class="loading">Lesson তৈরি হচ্ছে...</div>

  <div class="lesson-card" id="lessonCard" style="display:none;">
    <span class="badge" id="sourceBadge"></span>
    <p class="reason" id="reasonText"></p>
    <div class="lesson-text" id="lessonText"></div>
    <button class="go-btn" id="startBtn">এই Lesson দিয়ে প্র্যাকটিস শুরু করো</button>
  </div>

  <div id="debugBox" style="display:none; margin-top:16px; padding:12px; background:#3a1414; border:1px solid #ff6b6b; border-radius:8px; color:#ffb3b3; font-size:0.85rem; text-align:left; word-break:break-word;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="data/content-bank.js"></script>
<script src="js/session-store.js"></script>
<script src="js/ai-client.js"></script>
<script src="js/lesson-generator.js"></script>
<script>
  let currentLessonText = "";

  function showDebug(msg) {
    const box = document.getElementById("debugBox");
    box.style.display = "block";
    box.textContent = "⚠️ " + msg;
  }
  window.addEventListener("error", (e) => {
    showDebug("Script error: " + e.message + " (" + e.filename + ":" + e.lineno + ")");
  });

  async function loadLesson() {
    window.TBLastAIError = null;
    const lesson = await LessonGenerator.generateLesson();
    currentLessonText = lesson.text;

    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("lessonCard").style.display = "block";
    document.getElementById("reasonText").textContent = lesson.reason;
    document.getElementById("lessonText").textContent = lesson.text;

    if (lesson.source === "ai") {
      document.getElementById("sourceBadge").textContent = "✅ AI Lesson (আসলেই কাজ করেছে)";
    } else if (AIClient.isAiEnabled()) {
      document.getElementById("sourceBadge").textContent = "⚠️ AI চালু আছে কিন্তু fallback হয়েছে";
      if (window.TBLastAIError) showDebug("AI call failed: " + window.TBLastAIError);
    } else {
      document.getElementById("sourceBadge").textContent = "Rule-based Lesson (AI বন্ধ/সাইন-ইন নেই)";
    }
  }

  document.getElementById("startBtn").addEventListener("click", () => {
    sessionStorage.setItem("tb_custom_practice_text", currentLessonText);
    window.location.href = "practice.html";
  });

  // Wait for auth state so isAiEnabled() sees the real permission before
  // generating the lesson (otherwise it would always look "not signed in").
  TBAuth.onReady(() => { loadLesson(); });
</script>

</body>
</html>
